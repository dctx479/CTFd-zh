name: Sync Upstream & Auto-Localize

# ============================================================
# Variables（Settings → Secrets and variables → Actions → Variables）:
#
#   UPSTREAM_REPO      上游仓库 URL
#                      默认: https://github.com/CTFd/CTFd.git
#   UPSTREAM_BRANCH    上游分支名
#                      默认: master
#   TARGET_BRANCH      推送到本仓库的分支名
#                      默认: master
#   LOCALES            需要更新的语言代码，空格分隔
#                      默认: zh_Hans_CN zh_Hant_TW
#   PYTHON_VERSION     Python 版本
#                      默认: 3.11
#   TRANSLATE_PROVIDER 翻译提供商：deepl | openai
#                      默认: deepl（未配置 API Key 时自动跳过）
#   DEEPL_API_URL      DeepL 端点（provider=deepl 时可选）
#                      默认（免费版）: https://api-free.deepl.com/v2/translate
#                      Pro 版:        https://api.deepl.com/v2/translate
#   OPENAI_API_URL     OpenAI 兼容端点（provider=openai 时可选）
#                      默认: https://api.openai.com/v1/chat/completions
#                      示例: https://api.siliconflow.cn/v1/chat/completions
#   OPENAI_MODEL       模型名称（provider=openai 时可选）
#                      默认: gpt-4o-mini
#
# Secrets（Settings → Secrets and variables → Actions → Secrets）:
#
#   PAT_TOKEN          Personal Access Token（可选，用于触发后续 Actions）
#   DEEPL_API_KEY      DeepL API Key
#   OPENAI_API_KEY     OpenAI 兼容 API Key（SiliconFlow 等同理）
# ============================================================

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）
    # 注意：cron 表达式不支持 vars 表达式，如需修改频率请直接编辑此行
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

env:
  UPSTREAM_REPO:      ${{ vars.UPSTREAM_REPO      || 'https://github.com/CTFd/CTFd.git' }}
  UPSTREAM_BRANCH:    ${{ vars.UPSTREAM_BRANCH    || 'master' }}
  TARGET_BRANCH:      ${{ vars.TARGET_BRANCH      || 'master' }}
  LOCALES:            ${{ vars.LOCALES            || 'zh_Hans_CN zh_Hant_TW' }}
  PYTHON_VERSION:     ${{ vars.PYTHON_VERSION     || '3.11' }}
  TRANSLATE_PROVIDER: ${{ vars.TRANSLATE_PROVIDER || 'deepl' }}
  DEEPL_API_URL:      ${{ vars.DEEPL_API_URL      || 'https://api-free.deepl.com/v2/translate' }}
  OPENAI_API_URL:     ${{ vars.OPENAI_API_URL     || 'https://api.openai.com/v1/chat/completions' }}
  OPENAI_MODEL:       ${{ vars.OPENAI_MODEL       || 'gpt-4o-mini' }}

jobs:
  sync:
    name: Sync upstream and recompile translations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # 优先使用 PAT（可触发后续 Actions），否则退回 GITHUB_TOKEN
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream "$UPSTREAM_REPO" || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Check if upstream has new commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse "upstream/$UPSTREAM_BRANCH")
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new upstream commits, skipping."
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "New commits found: $UPSTREAM_SHA"
          fi

      - name: Try to merge upstream
        if: steps.check.outputs.has_new == 'true'
        id: merge
        run: |
          if git merge "upstream/$UPSTREAM_BRANCH" --no-edit --strategy-option=ours; then
            echo "merge_conflict=false" >> $GITHUB_OUTPUT
          else
            echo "merge_conflict=true" >> $GITHUB_OUTPUT
            git merge --abort || true
          fi

      - name: Set up Python
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Babel
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: pip install Babel

      - name: Install translation API dependencies
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: |
          if [ "$TRANSLATE_PROVIDER" = "deepl" ] && [ -n "$DEEPL_API_KEY" ]; then
            echo "✓ DeepL @ $DEEPL_API_URL"
          elif [ "$TRANSLATE_PROVIDER" = "openai" ] && [ -n "$OPENAI_API_KEY" ]; then
            echo "✓ OpenAI-compatible: $OPENAI_MODEL @ $OPENAI_API_URL"
          else
            echo "未配置翻译 API Key，新增字符串将留空等待人工翻译"
          fi
        env:
          DEEPL_API_KEY:  ${{ secrets.DEEPL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Extract new translation strings
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: |
          pybabel extract \
            -F babel.cfg \
            -k lazy_gettext \
            -o messages.pot \
            CTFd/
          echo "msgid count: $(grep -c '^msgid' messages.pot)"

      - name: Update .po files for each locale
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: |
          for locale in $LOCALES; do
            echo "Updating locale: $locale"
            pybabel update \
              -i messages.pot \
              -d CTFd/translations \
              -l "$locale" \
              --no-wrap
            untranslated=$(grep -c '^msgstr ""' \
              "CTFd/translations/$locale/LC_MESSAGES/messages.po" || true)
            echo "  → $untranslated untranslated string(s)"
          done

      - name: Auto-translate new strings via API
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        env:
          DEEPL_API_KEY:  ${{ secrets.DEEPL_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          HAS_API=false
          if [ "$TRANSLATE_PROVIDER" = "deepl" ]  && [ -n "$DEEPL_API_KEY" ];  then HAS_API=true; fi
          if [ "$TRANSLATE_PROVIDER" = "openai" ] && [ -n "$OPENAI_API_KEY" ]; then HAS_API=true; fi

          if [ "$HAS_API" = "false" ]; then
            echo "未配置翻译 API，跳过此步骤"
            exit 0
          fi

          for locale in $LOCALES; do
            po_file="CTFd/translations/$locale/LC_MESSAGES/messages.po"
            echo "── 翻译 $locale ──"
            python scripts/auto_translate_po.py "$po_file" --provider "$TRANSLATE_PROVIDER"
          done

      - name: Compile all .mo files
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: pybabel compile -d CTFd/translations

      - name: Commit and push
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'false'
        run: |
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi
          UPSTREAM_SHORT=$(git rev-parse --short "upstream/$UPSTREAM_BRANCH")
          git commit -m "chore: sync upstream@${UPSTREAM_SHORT} and recompile translations"
          git push origin "$TARGET_BRANCH"

      - name: Open issue on merge conflict
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const upstreamRepo = process.env.UPSTREAM_REPO;
            const upstreamBranch = process.env.UPSTREAM_BRANCH;
            const targetBranch = process.env.TARGET_BRANCH;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 上游同步冲突，需要人工处理',
              body: [
                `上游 [${upstreamRepo}](${upstreamRepo}) \`${upstreamBranch}\` 分支有新提交，但自动合并时发生冲突。`,
                '',
                '请手动合并并解决冲突：',
                '```bash',
                `git fetch upstream ${upstreamBranch}`,
                `git merge upstream/${upstreamBranch}`,
                '# 解决冲突后',
                `git push origin ${targetBranch}`,
                '```',
                '',
                `触发时间：${new Date().toISOString()}`,
              ].join('\n'),
              labels: ['upstream-conflict'],
            });
