name: Sync Upstream & Auto-Localize

on:
  schedule:
    # 每天 UTC 02:00（北京时间 10:00）运行
    - cron: '0 2 * * *'
  workflow_dispatch:
    # 支持手动触发

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    name: Sync from CTFd/CTFd and re-compile translations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork (dctx479/CTFd-zh)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/CTFd/CTFd.git || true
          git fetch upstream master

      - name: Check if upstream has new commits
        id: check
        run: |
          UPSTREAM_SHA=$(git rev-parse upstream/master)
          LOCAL_SHA=$(git rev-parse HEAD)
          echo "upstream_sha=$UPSTREAM_SHA" >> $GITHUB_OUTPUT
          echo "local_sha=$LOCAL_SHA" >> $GITHUB_OUTPUT
          if [ "$UPSTREAM_SHA" = "$LOCAL_SHA" ]; then
            echo "has_new=false" >> $GITHUB_OUTPUT
            echo "No new upstream commits."
          else
            echo "has_new=true" >> $GITHUB_OUTPUT
            echo "New upstream commits found."
          fi

      - name: Try to merge upstream
        if: steps.check.outputs.has_new == 'true'
        id: merge
        run: |
          git merge upstream/master --no-edit --strategy-option=ours || echo "merge_conflict=true" >> $GITHUB_OUTPUT
          echo "merge_conflict=false" >> $GITHUB_OUTPUT

      - name: Set up Python
        if: steps.check.outputs.has_new == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Babel
        if: steps.check.outputs.has_new == 'true'
        run: pip install Babel

      - name: Extract new translation strings
        if: steps.check.outputs.has_new == 'true'
        run: |
          pybabel extract \
            -F babel.cfg \
            -k lazy_gettext \
            -o messages.pot \
            CTFd/
          echo "Extraction complete. New strings in messages.pot:"
          grep -c "^msgid" messages.pot || true

      - name: Update zh_Hans_CN .po file with new strings
        if: steps.check.outputs.has_new == 'true'
        run: |
          pybabel update \
            -i messages.pot \
            -d CTFd/translations \
            -l zh_Hans_CN \
            --no-wrap
          # Report new untranslated strings
          echo "Untranslated strings in zh_Hans_CN:"
          grep -A1 'msgstr ""' CTFd/translations/zh_Hans_CN/LC_MESSAGES/messages.po \
            | grep "^msgid" | head -20 || true

      - name: Update zh_Hant_TW .po file with new strings
        if: steps.check.outputs.has_new == 'true'
        run: |
          pybabel update \
            -i messages.pot \
            -d CTFd/translations \
            -l zh_Hant_TW \
            --no-wrap

      - name: Compile all .mo files
        if: steps.check.outputs.has_new == 'true'
        run: |
          pybabel compile -d CTFd/translations
          echo "Compilation complete."

      - name: Commit and push if there are changes
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict != 'true'
        run: |
          git add -A
          git diff --cached --quiet && echo "Nothing to commit." && exit 0
          UPSTREAM_SHORT=$(git rev-parse --short upstream/master)
          git commit -m "chore: sync upstream CTFd@${UPSTREAM_SHORT} and recompile translations"
          git push origin master

      - name: Open PR on merge conflict
        if: steps.check.outputs.has_new == 'true' && steps.merge.outputs.merge_conflict == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '⚠️ 上游同步冲突，需要人工处理',
              body: `上游 [CTFd/CTFd](https://github.com/CTFd/CTFd) 有新提交，但自动合并时发生冲突。\n\n请手动合并并解决冲突：\n\`\`\`bash\ngit fetch upstream master\ngit merge upstream/master\n# 解决冲突后\ngit push origin master\n\`\`\`\n\n触发时间：${new Date().toISOString()}`,
              labels: ['upstream-conflict']
            });
